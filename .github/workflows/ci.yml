name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build (headless)
        run: |
          mkdir -p build
          cd build
          cmake -DNXEMU_HEADLESS=ON ..
          cmake --build .

      - name: Test (run fixture ROM)
        run: ./build/nxemu test/fixtures/minimal.nxrom
